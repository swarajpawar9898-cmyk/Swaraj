<!DOCTYPE html>
<html>
<head>
    <title>Netflix N Animation</title>

    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logo {
            position: relative;
            width: 120px;
            height: 220px;
        }

        .bar {
            position: absolute;
            width: 30px;
            height: 0;
            background: linear-gradient(to bottom, #ff0000, #b30000);
            box-shadow: 0 0 25px red;
            animation: grow 0.8s ease forwards;
        }

        /* Left bar */
        .left {
            left: 0;
            animation-delay: 0s;
        }

        /* Right bar */
        .right {
            right: 0;
            animation-delay: 0.6s;
        }

        /* Middle diagonal */
        .middle {
            left: 45px;
            transform: rotate(20deg);
            transform-origin: top left;
            animation-delay: 0.3s;
        }

        @keyframes grow {
            from {
                height: 0;
            }
            to {
                height: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="logo">
        <div class="bar left"></div>
        <div class="bar middle"></div>
        <div class="bar right"></div>
    </div>

</body>
</html>
