<!DOCTYPE html>
<html>
<head>
    <title>Tudum Clone</title>

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: black;
            padding: 15px 30px;
            font-size: 28px;
            font-weight: bold;
            color: red;
        }

        .banner img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .section {
            padding: 20px 30px;
        }

        .cards {
            display: flex;
            gap: 15px;
        }

        .card {
            background-color: #111;
            padding: 10px;
            border-radius: 8px;
            width: 150px;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.1);
        }

        .card img {
            width: 100%;
            border-radius: 5px;
        }

        video {
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>NETFLIX TUDUM</header>

    <div class="banner">
        <img src="https://via.placeholder.com/1200x300" alt="Banner">
    </div>

    <div class="section">
        <h2>Popular Now</h2>

        <div class="cards">
            <div class="card">
                <img src="https://via.placeholder.com/150" alt="">
                <p>Stranger Things</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/150" alt="">
                <p>Money Heist</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/150" alt="">
                <p>Wednesday</p>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/150" alt="">
                <p>Squid Game</p>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Watch Trailer</h2>

        <video width="400" controls>
            <source src="sample.mp4" type="video/mp4">
        </video>
    </div>

</body>
</html>
