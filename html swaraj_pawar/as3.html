<html>
<head>
<title>User-defined objects</title>

<script type="text/javascript">

// Movie object
var movie = new Object();
movie.name = "3 Idiots";
movie.actor = "Aamir Khan";

</script>

</head>

<body>

<script type="text/javascript">



document.write("Movie name is : " + movie.name + "<br>");
document.write("Movie actor is : " + movie.actor + "<br>");

</script>

</body>
</html>
